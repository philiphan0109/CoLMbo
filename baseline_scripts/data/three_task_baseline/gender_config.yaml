train_mapper: true
train_sid: false
data:
  train: dictionaries/train_segdata.json
  val: dictionaries/val_segdata.json
  test: dictionaries/test_segdata.json
  DATA_DIR: ./tears
  sample_rate: 16000
  waveform: baseline_scripts/data/three_task_baseline/gender.wav
  prompt: What is the speaker's gender inferred from their speech characteristics?
train:
  total_epochs: 100
  save_every: 4
  eval_every: 10
  batch_size: 64
  lambda_val: 1
  lr: 0.0001
  weight_decay: 1.0e-06
  phone_frame: phone_vector
  flag_global_local: global
  snapshot_path: ./checkpoint_mlp_mapper/
sid_model:
  d_model: 128
  heads: 8
  dropout: 0.001
  sid_ck_name: sid_model.pt
  resume: true
wrapper:
  map_type: mlp
  text_decoder: gpt2
  emb_size: 192
  prefix_size: 192
  text_prefix_length: 80
  sid_prefix_length: 40
  text_prefix_length_clip: 80
  sid_prefix_length_clip: 40
  num_layers: 8
  tok_len: 80
  norm_sid_emb: true
  mapper_ck_name: mapper_ce_llm.pt
  resume: true
  gpu_id: 0
  device: cuda
wandb:
  project: explainability
  start_method: fork
  service_wait: 100
